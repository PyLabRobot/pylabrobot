repos:
  - repo: local
    hooks:
      - id: ruff-format
        name: ruff format
        entry: ruff format
        language: system
        types: [python]
        files: ^pylabrobot/.*$

      - id: ruff-check
        name: ruff check
        entry: ruff check --fix
        language: system
        types: [python]
        files: ^pylabrobot/.*$

  - repo: https://github.com/crate-ci/typos
    rev: v1
    hooks:
      - id: typos
        files: ^pylabrobot/.*$
        args: ["--force-exclude"]
