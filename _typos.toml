[default]
extend-ignore-identifiers-re = [
    "AttributeID.*Supress.*",
]

[default.extend-identifiers]
AttributeIDSupressMenu = "AttributeIDSupressMenu"

[default.extend-words]
# words that should not be corrected
dot_acn = ".acn"
dot_fot = ".fot"
dot_ist = ".ist"
OT = "OT"
ot = "ot"
ser = "ser"
ba = "ba"
nd = "nd"
PN = "PN"
tro = "tro"
FO = "FO"
UE = "UE"
commutated = "commutated"
commutating = "commutating"
DOUT = "DOUT"
inconsistence = "inconsistence"
mis = "mis"
RHE = "RHE"
"ASEND" = "ASEND"
caf = "caf"
# Tecan firmware command abbreviations
ALO = "ALO"
SOM = "SOM"
SHS = "SHS"
SHW = "SHW"
AZMA = "AZMA"
MCH = "MCH"
AAS = "AAS"
AER = "AER"

[files]
extend-exclude = [
    "*.ipynb",
    "keyser-testing/Tecan Manuals/",
    "keyser-testing/evoware-usb-capture-aspirate-dispense/",
    "keyser-testing/evoware-usb-capture-multidispense/",
    "keyser-testing/evoware-pktmon-capture-20260327/",
]
