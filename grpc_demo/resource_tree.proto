syntax = "proto3";

package resource_tree;

// Core types

message CoordinateMsg {
  double x = 1;
  double y = 2;
  double z = 3;
}

message RotationMsg {
  double x = 1;
  double y = 2;
  double z = 3;
}

message ResourceMsg {
  string name = 1;
  double size_x = 2;
  double size_y = 3;
  double size_z = 4;
  optional string category = 5;
  optional string model = 6;
  RotationMsg rotation = 7;
  CoordinateMsg location = 8;
  string parent_name = 9;
  repeated ResourceMsg children = 10;
}

// Requests / Responses

message AssignChildRequest {
  string parent_name = 1;       // name of the resource to attach to
  ResourceMsg child = 2;        // the new child resource
  CoordinateMsg location = 3;   // location relative to parent
  bool reassign = 4;
}

message UnassignChildRequest {
  string parent_name = 1;
  string child_name = 2;
}

message GetResourceRequest {
  string name = 1;
}

message GetTreeRequest {}

message GetChildrenRequest {
  string name = 1;
}

message RotateRequest {
  string name = 1;
  double x = 2;
  double y = 3;
  double z = 4;
}

message MoveRequest {
  string parent_name = 1;          // current parent
  string child_name = 2;           // resource to move
  string new_parent_name = 3;      // destination parent
  CoordinateMsg new_location = 4;  // location in destination parent
}

message ResourceResponse {
  ResourceMsg resource = 1;
}

message TreeResponse {
  ResourceMsg root = 1;
}

message ChildrenResponse {
  repeated ResourceMsg children = 1;
}

message Empty {}

// Events streamed to clients

message TreeEvent {
  enum EventType {
    CHILD_ASSIGNED = 0;
    CHILD_UNASSIGNED = 1;
    RESOURCE_ROTATED = 2;
    RESOURCE_MOVED = 3;
  }
  EventType type = 1;
  string parent_name = 2;
  string resource_name = 3;
  ResourceMsg snapshot = 4;       // latest snapshot of affected resource
}

message SubscribeRequest {}

// The service

service ResourceTreeService {
  // Queries
  rpc GetTree (GetTreeRequest) returns (TreeResponse);
  rpc GetResource (GetResourceRequest) returns (ResourceResponse);
  rpc GetChildren (GetChildrenRequest) returns (ChildrenResponse);

  // Mutations
  rpc AssignChild (AssignChildRequest) returns (ResourceResponse);
  rpc UnassignChild (UnassignChildRequest) returns (Empty);
  rpc Rotate (RotateRequest) returns (ResourceResponse);
  rpc Move (MoveRequest) returns (ResourceResponse);

  // Live updates
  rpc Subscribe (SubscribeRequest) returns (stream TreeEvent);
}
