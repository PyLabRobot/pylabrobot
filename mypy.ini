# Global options:

[mypy]
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True

# Per-module options:

[mypy-usb.*]
ignore_missing_imports = True

[mypy-ot_api.*]
ignore_missing_imports = True

[mypy-serial.*]
ignore_missing_imports = True

[mypy-pylibftdi.*]
ignore_missing_imports = True

[mypy-opentrons_shared_data.*]
ignore_missing_imports = True

# Vendored Agilent Bravo control core (reverse-engineered from the OpenBravo
# project). Relaxed type-checking for the vendored modules; the backend
# adapter (bravo_backend.py) itself is fully type-checked.
[mypy-pylabrobot.liquid_handling.backends.agilent.bravo.*]
ignore_errors = True
